services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: roblox_creator
      POSTGRES_USER: roblox_user
      POSTGRES_PASSWORD: roblox_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roblox_user -d roblox_creator"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://roblox_user:roblox_pass@postgres:5432/roblox_creator
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: rq worker --url redis://redis:6379
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://roblox_user:roblox_pass@postgres:5432/roblox_creator
      REDIS_URL: redis://redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
